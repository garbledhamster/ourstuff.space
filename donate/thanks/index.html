<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanks - Ourstuff.space</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px;
}

.thanks-card {
  width: min(100%, 560px);
  background: white;
  border-radius: 8px;
  padding: 34px;
  color: #26213f;
  box-shadow: 0 24px 60px rgba(0, 0, 0, 0.24);
}

h1 {
  font-size: clamp(2rem, 6vw, 3rem);
  margin-bottom: 12px;
}

.message {
  color: #666;
  font-size: 1.05rem;
  line-height: 1.55;
  margin-bottom: 24px;
}

.details {
  display: grid;
  gap: 12px;
  margin-bottom: 26px;
  padding: 18px;
  background: #f8f8ff;
  border: 1px solid #e4e4f3;
  border-radius: 8px;
}

.detail-row {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  color: #555;
}

.detail-row strong {
  color: #26213f;
  text-align: right;
}

.home-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 44px;
  border-radius: 8px;
  background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
  color: white;
  font-weight: 700;
  padding: 0 18px;
  text-decoration: none;
}

.error {
  color: #b42318;
}
</style>
</head>

<body>
  <main class="thanks-card">
    <h1>Thank you</h1>
    <p class="message" id="thanks-message">Checking your donation details...</p>
    <div class="details" id="thanks-details" hidden></div>
    <a class="home-link" href="/">Back to Ourstuff.space</a>
  </main>

<script>
const DONATION_WORKER_URL = "https://stripe-worker-api.jrice.workers.dev";
const messageEl = document.getElementById("thanks-message");
const detailsEl = document.getElementById("thanks-details");
const sessionId = new URLSearchParams(window.location.search).get("session_id");

function setError(message) {
  messageEl.classList.add("error");
  messageEl.textContent = message;
  detailsEl.hidden = true;
}

function addDetail(label, value) {
  if (!value) return;

  const row = document.createElement("div");
  const labelEl = document.createElement("span");
  const valueEl = document.createElement("strong");
  row.className = "detail-row";
  labelEl.textContent = label;
  valueEl.textContent = value;
  row.append(labelEl, valueEl);
  detailsEl.appendChild(row);
}

async function loadDonationDetails() {
  if (!sessionId) {
    setError("Missing checkout session. Your donation may still have completed, but there are no details to show here.");
    return;
  }

  const response = await fetch(
    `${DONATION_WORKER_URL}/api/checkout/sessions/${encodeURIComponent(sessionId)}`
  );
  const result = await response.json();

  if (!response.ok) {
    throw new Error(result?.error?.message || "Could not load donation details.");
  }

  messageEl.textContent = result.status === "paid"
    ? "Your donation was received through secure Stripe checkout."
    : "Stripe returned you to this page. The payment status is shown below.";
  addDetail("Status", result.status);
  addDetail("Amount", result.amount);
  addDetail("Site", result.site);
  addDetail("Email", result.customerEmail);
  detailsEl.hidden = false;
}

loadDonationDetails().catch((error) => {
  setError(error instanceof Error ? error.message : "Could not load donation details.");
});
</script>
</body>
</html>
